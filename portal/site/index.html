<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Moshimo Tools</title>
  <link rel="stylesheet" href="/assets/portal.css">
</head>
<body>
  <header class="hero">
    <p class="eyebrow">Moshimo Tools</p>
    <h1>个人工具集</h1>
    <p class="sub">把常用的信息抓取、分析和管理工具放在一个入口里。</p>
  </header>

  <main class="tools">
    <a class="tool tool-news" href="/news/">
      <span class="mark">AI</span>
      <span>
        <strong>AI News Hub</strong>
        <small>AI 行业新闻聚合与分类</small>
      </span>
      <span class="open">打开</span>
    </a>

    <a class="tool tool-ca" href="/ca/">
      <span class="mark">CA</span>
      <span>
        <strong>CA Tracker</strong>
        <small>合约地址、链上快照和标签管理</small>
      </span>
      <span class="open">打开</span>
    </a>
  </main>
</body>
</html>
