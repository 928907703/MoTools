{% extends "base.html" %}
{% block title %}标签管理 · CA Tracker{% endblock %}
{% block content %}
<h1>标签管理</h1>

<form method="post" action="{{ prefix }}/tags" class="inline-form">
  <input name="name" required placeholder="标签名（如 meme / L2 / suspicious）">
  <input name="category" placeholder="分类（赛道/类型/状态）">
  <button type="submit">新增</button>
</form>

<table class="tokens">
  <thead><tr><th>名称</th><th>分类</th><th>操作</th></tr></thead>
  <tbody>
    {% for t in tags %}
    <tr>
      <td>
        <form method="post" action="{{ prefix }}/tags/{{ t.id }}/update" class="inline-form" id="tag-{{ t.id }}">
          <input name="name" value="{{ t.name }}">
      </td>
      <td>
          <input name="category" value="{{ t.category or '' }}">
      </td>
      <td>
          <button type="submit">保存</button>
        </form>
        <form method="post" action="{{ prefix }}/tags/{{ t.id }}/delete" class="inline-form" onsubmit="return confirm('确定删除？');">
          <button type="submit" class="danger">删</button>
        </form>
      </td>
    </tr>
    {% else %}
    <tr><td colspan="3" class="empty">还没有标签</td></tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
