<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{% block title %}CA Tracker{% endblock %}</title>
  <link rel="stylesheet" href="{{ prefix }}/static/style.css">
</head>
<body>
  <nav class="tool-switcher">
    <a href="/" class="tool-switcher-brand">MoTools</a>
    <a href="/news/">AI News</a>
    <a href="/ca/" class="active">CA Tracker</a>
  </nav>
  <svg xmlns="http://www.w3.org/2000/svg" style="display:none" aria-hidden="true">
    <defs>
      {# X / Twitter — filled mark #}
      <symbol id="i-x" viewBox="0 0 24 24"><path fill="currentColor" d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></symbol>
      <symbol id="i-twitter" viewBox="0 0 24 24"><path fill="currentColor" d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></symbol>
      {# Telegram paper plane #}
      <symbol id="i-telegram" viewBox="0 0 24 24"><path fill="currentColor" d="M21.5 3.5 2.5 11l5.5 2 2 6.5 3-3.5 5 4 3.5-16.5zm-2.6 3.1L10 13.5l-.3 3.7-1.6-4.4 11-6z"/></symbol>
      {# Discord #}
      <symbol id="i-discord" viewBox="0 0 24 24"><path fill="currentColor" d="M19.27 5.33A18 18 0 0 0 14.94 4l-.18.27a16.3 16.3 0 0 1 4.83 2.45 16.5 16.5 0 0 0-14.2 0A16.3 16.3 0 0 1 10.23 4.27L10.05 4A18 18 0 0 0 5.72 5.33C2.93 9.45 2.18 13.45 2.55 17.4A18 18 0 0 0 7.86 20l1.07-1.45c-.93-.32-1.83-.74-2.69-1.27.22-.16.45-.32.66-.49a13 13 0 0 0 11.21 0c.21.17.43.33.65.49-.85.53-1.76.95-2.69 1.27L17.14 20a18 18 0 0 0 5.31-2.6c.45-4.6-.7-8.55-3.18-12.07zM8.52 15.33c-1.05 0-1.92-.96-1.92-2.14s.84-2.14 1.92-2.14 1.94.97 1.92 2.14c0 1.18-.85 2.14-1.92 2.14zm7.07 0c-1.05 0-1.92-.96-1.92-2.14s.84-2.14 1.92-2.14 1.94.97 1.92 2.14c0 1.18-.84 2.14-1.92 2.14z"/></symbol>
      {# Globe (website) — outlined #}
      <symbol id="i-website" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15 15 0 0 1 0 20"/><path d="M12 2a15 15 0 0 0 0 20"/></symbol>
      {# GitHub — line-style octocat (lucide) #}
      <symbol id="i-github" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.4 5.4 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"/><path d="M9 18c-4.51 2-5-2-7-2"/></symbol>
      {# Medium "M" #}
      <symbol id="i-medium" viewBox="0 0 24 24"><path fill="currentColor" d="M2.85 4.5A.5.5 0 0 1 3.2 4h17.6c.19 0 .35.16.35.5l-1.05 1.05a.55.55 0 0 0-.2.46v12.98c0 .2.07.36.2.46l1.03 1V21H10.46v-.55l1.06-1.04a.6.6 0 0 0 .2-.51V8.41l-2.96 12.56h-.4L5 8.41v8.42c-.04.31.07.62.3.85L6.7 19.4v.55h-4V19.4l1.4-1.72a1 1 0 0 0 .3-.85V5.42a.74.74 0 0 0-.25-.62z"/></symbol>
      {# Reddit #}
      <symbol id="i-reddit" viewBox="0 0 24 24"><path fill="currentColor" d="M22 12.18a2.18 2.18 0 0 0-3.7-1.55c-1.5-1-3.4-1.65-5.55-1.74l1.13-3.55 3.05.72a1.7 1.7 0 1 0 .07-1.55l-3.4-.8a.45.45 0 0 0-.54.32l-1.27 4-.13.01c-2.16.09-4.07.74-5.57 1.74A2.17 2.17 0 0 0 2 12.18c0 .87.5 1.62 1.24 1.97-.05.32-.07.65-.07.97 0 3.6 4.1 6.54 9.17 6.54s9.17-2.93 9.17-6.54c0-.33-.03-.65-.08-.97A2.17 2.17 0 0 0 22 12.18zM7.5 14a1.45 1.45 0 1 1 2.9 0 1.45 1.45 0 0 1-2.9 0zm8.59 4.04c-1.04 1.04-3.03 1.13-3.59 1.13s-2.55-.09-3.6-1.13a.4.4 0 1 1 .57-.56c.65.66 2.04.89 3.03.89s2.38-.23 3.03-.89a.4.4 0 1 1 .56.56zm-.05-2.59a1.45 1.45 0 1 1 0-2.9 1.45 1.45 0 0 1 0 2.9z"/></symbol>
      {# YouTube #}
      <symbol id="i-youtube" viewBox="0 0 24 24"><path fill="currentColor" d="M23.5 6.5a3 3 0 0 0-2.1-2.1C19.5 4 12 4 12 4s-7.5 0-9.4.4A3 3 0 0 0 .5 6.5C.1 8.4.1 12 .1 12s0 3.6.4 5.5a3 3 0 0 0 2.1 2.1c1.9.4 9.4.4 9.4.4s7.5 0 9.4-.4a3 3 0 0 0 2.1-2.1c.4-1.9.4-5.5.4-5.5s0-3.6-.4-5.5zM9.75 15.5v-7L15.5 12z"/></symbol>
      {# Generic external link #}
      <symbol id="i-link" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.07 0l3-3a5 5 0 0 0-7.07-7.07l-1.5 1.5"/><path d="M14 11a5 5 0 0 0-7.07 0l-3 3a5 5 0 0 0 7.07 7.07l1.5-1.5"/></symbol>
      {# Copy (two overlapping squares) #}
      <symbol id="i-copy" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></symbol>
      {# Check (for copy-success feedback) #}
      <symbol id="i-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></symbol>
    </defs>
  </svg>
  <header class="topbar">
    <a href="{{ prefix or '/' }}" class="brand">CA Tracker</a>
    <nav>
      <a href="{{ prefix or '/' }}">列表</a>
      <a href="{{ prefix }}/new">录入</a>
      <a href="{{ prefix }}/tags">标签</a>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <script>
    document.addEventListener('click', async (e) => {
      const btn = e.target.closest('.copy-btn');
      if (!btn) return;
      e.preventDefault();
      const text = btn.dataset.copy;
      if (!text) return;
      try {
        await navigator.clipboard.writeText(text);
      } catch {
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.select();
        try { document.execCommand('copy'); } catch {}
        document.body.removeChild(ta);
      }
      btn.classList.add('copied');
      const use = btn.querySelector('use');
      const prev = use && use.getAttribute('href');
      if (use) use.setAttribute('href', '#i-check');
      setTimeout(() => {
        btn.classList.remove('copied');
        if (use && prev) use.setAttribute('href', prev);
      }, 1200);
    });
  </script>
</body>
</html>
